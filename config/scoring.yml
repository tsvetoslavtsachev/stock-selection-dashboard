# -----------------------------------------------------------------------------
# Stock Selection Dashboard - scoring weights (INIT-22 M2 rework)
# -----------------------------------------------------------------------------
# COMMITTED on purpose: this is a PUBLIC dashboard, so its production weights must
# live in git - NOT in the gitignored config/settings.yml (whose `scoring:` block
# was decorative and never read). scoring.py reads THIS file; editing a weight here
# provably changes the ranking.
#
# COMPOSITE = Trend + Quality + Value (three buckets, equal thirds). Risk is NO
# LONGER in the composite (M2): it is a separate REGIME LENS (still scored and
# shown, but the regime bet lives in VRM, not in this cross-sectional ranker).
#
# The composite `trend/quality/value: 0.3333...` below are the NOMINAL / TARGET
# CONTRIBUTION shares, not raw coefficients: scoring.py solves equal-contribution
# (ERC) weights on the buckets' covariance so each bucket carries an equal SHARE of
# the composite variance. "Equal weight = equal influence" is then true by
# construction, not a claim. These nominal shares are the ERC targets (equal), and
# also the fallback the composite uses if the ERC solve degenerates.
# -----------------------------------------------------------------------------

composite:
  trend:    0.3334
  quality:  0.3333
  value:    0.3333

subfactors:
  trend:                # 12-1 skip-month momentum only (ret_13w is UI-only now)
    ret_12_1:  1.0
  quality:              # profitability; ROIC dropped (noisy proxy, UI-only now)
    roe:                0.25
    oper_margin_ttm:    0.25
    fcf_margin_ttm:     0.25
    gpa:                0.25   # gross profit / total assets (Novy-Marx)
  value:                # yield-form (1/multiple): higher = cheaper = better
    pe_ratio:           0.3334
    ev_ebitda:          0.3333   # NaN for Financials (meaningless for banks)
    net_payout_yield:   0.3333   # (dividends + buybacks) TTM / market cap
  risk:                 # REGIME LENS - scored + shown, NOT in the composite
    volatility_26w: 0.3334
    debt_equity:    0.3333
    beta:           0.3333
