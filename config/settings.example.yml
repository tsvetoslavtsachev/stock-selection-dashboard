# ─────────────────────────────────────────────────────────────────────────────
# Stock Selection Dashboard — Settings (yfinance edition)
# ─────────────────────────────────────────────────────────────────────────────
# Copy this file to config/settings.yml before running the pipeline.
# config/settings.yml is listed in .gitignore and MUST NOT be committed.
# ─────────────────────────────────────────────────────────────────────────────

# ── Project metadata ──────────────────────────────────────────────────────────
project:
  name:           "S&P 500 Factor Dashboard"
  market:         "US"
  benchmark:      "SPY"
  base_currency:  "USD"

# ── Data source ───────────────────────────────────────────────────────────────
# yfinance requires no API key. All price and fundamental data comes from Yahoo.
data_source: "yfinance"

# ── SEC EDGAR (optional, for fallback CIK lookups) ───────────────────────────
sec:
  user_agent: "StockDashboard yourname@email.com"
  rate_limit_delay: 0.12

# ── Pipeline behaviour ────────────────────────────────────────────────────────
pipeline:
  # Hard cap on universe size (safety net).
  max_universe_size: 600

  # Re-fetch prices even if a recent local file exists.
  refresh_prices: true

  # Write output JSON files to app/data/ after scoring.
  publish_json: true

  # Max calendar age (days) before a cached price file is considered stale.
  price_max_age_days: 1

  # Number of top stocks to include in leaders.json.
  n_leaders: 10

# ── Scoring weights ───────────────────────────────────────────────────────────
# All weights within a group must sum to 1.0.
scoring:
  composite:
    trend:    0.30
    quality:  0.30
    value:    0.25
    risk:     0.15

  trend:
    ret_13w:  0.40
    ret_26w:  0.30
    ret_52w:  0.30

  quality:
    roe:                0.30
    oper_margin_ttm:    0.25
    fcf_margin_ttm:     0.25
    roic:               0.20

  value:
    pe_ratio:       0.35
    ev_ebitda:      0.30
    pb_ratio:       0.20
    dividend_yield: 0.15

  risk:
    volatility_26w: 0.50
    debt_equity:    0.30
    beta:           0.20

# ── Publish paths ─────────────────────────────────────────────────────────────
publish:
  app_data_path: "app/data"
