name: Update Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: '15 22 * * 1-5'   # Mon–Fri 22:15 UTC (after US market close)

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60        # yfinance for 500 tickers can take ~30 min
    env:
      # INIT-22 P9 strangler. Set BOTH repo secrets to source prices from the canonical
      # price-archive base (mechanism = checkout via read PAT, mirror of the SP500 twins):
      #   DATACORE_RO_PAT       -> data-core (private)     : the P1 reader datacore.archive
      #   PRICE_ARCHIVE_RO_PAT  -> price-archive (private) : the canonical daily bars (the data)
      # ABSENT (either) -> the base checkouts are skipped, the consumer import fails, and
      # fetch_prices falls back to its DAILY yfinance pull (degraded but functional). collectors
      # is PUBLIC (the reader) -> no token. Fundamentals stay a separate live yfinance phase.
      DATACORE_RO_PAT: ${{ secrets.DATACORE_RO_PAT }}
      PRICE_ARCHIVE_RO_PAT: ${{ secrets.PRICE_ARCHIVE_RO_PAT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Prepare settings
        run: cp config/settings.example.yml config/settings.yml

      # ---- P9: canonical prices come FROM the price-archive base; only when BOTH PATs are set ----
      - name: Checkout data-core (P1 reader, read-only)
        if: ${{ env.DATACORE_RO_PAT != '' && env.PRICE_ARCHIVE_RO_PAT != '' }}
        uses: actions/checkout@v4
        with:
          repository: tsvetoslavtsachev/data-core
          token: ${{ env.DATACORE_RO_PAT }}   # Contents=READ only -- cannot corrupt canon
          path: .data-core
          fetch-depth: 1
      - name: Checkout price-archive (canonical daily bars, read-only)
        if: ${{ env.DATACORE_RO_PAT != '' && env.PRICE_ARCHIVE_RO_PAT != '' }}
        uses: actions/checkout@v4
        with:
          repository: tsvetoslavtsachev/price-archive
          token: ${{ env.PRICE_ARCHIVE_RO_PAT }}   # Contents=READ only
          path: .price-archive
          fetch-depth: 1
      - name: Checkout collectors (public, the price reader)
        if: ${{ env.DATACORE_RO_PAT != '' && env.PRICE_ARCHIVE_RO_PAT != '' }}
        uses: actions/checkout@v4
        with:
          repository: tsvetoslavtsachev/collectors
          path: .collectors
          fetch-depth: 1

      - name: Run pipeline
        run: |
          # Stale-guard: if fetch_prices crashes before it rewrites price_source.json,
          # the guard must see NO file (=> RED) rather than read last run's provenance
          # and pass a total outage green. run_pipeline exits non-zero on any step
          # failure, so this step (and the commit) fail loud.
          rm -f price_source.json
          python -m src.jobs.run_pipeline
        env:
          # When the base checkouts ran, the consumer reads canon from .price-archive via the P1
          # reader on PYTHONPATH; otherwise these point at absent dirs, the import fails, and
          # fetch_prices transparently uses the DAILY yfinance CLOSED fallback.
          DATACORE_ROOT: ${{ github.workspace }}/.price-archive
          PYTHONPATH: ${{ github.workspace }}/.data-core:${{ github.workspace }}/.collectors

      # P9 guard: with the PATs set, base sourcing is INTENDED -- fail RED (before any commit) on a
      # silent mass-fallback to yfinance (coverage floor + HON allow-list).
      - name: Assert base-sourced (no silent yfinance fallback)
        if: ${{ env.DATACORE_RO_PAT != '' && env.PRICE_ARCHIVE_RO_PAT != '' }}
        run: python scripts/assert_base_sourced.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/data/ price_source.json
          git diff --staged --quiet || git commit -m "data: update $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
